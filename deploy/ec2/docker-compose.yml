services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/scene-archive-backend:latest
    container_name: scene-archive-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      SCENE_ARCHIVE_DB_PATH: /data/scene_archive.db
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
